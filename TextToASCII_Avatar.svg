<svg width="512" height="512" xmlns="http://www.w3.org/2000/svg">
  <!-- Белый фон -->
  <rect width="512" height="512" fill="#FFFFFF"/>
  
  <!-- Градиентный фон для глубины -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F0F4FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8F0FF;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Фоновый градиент -->
  <rect width="512" height="512" fill="url(#bgGradient)"/>
  
  <!-- Декоративный круг сзади -->
  <circle cx="256" cy="256" r="200" fill="#E0E7FF" opacity="0.5"/>
  
  <!-- ASCII блоки в виде буквы "A" (стилизованно) -->
  <g filter="url(#shadow)">
    <!-- Верхняя часть A -->
    <rect x="180" y="140" width="40" height="40" fill="#4F46E5" rx="4"/>
    <rect x="240" y="140" width="40" height="40" fill="#5B21B6" rx="4"/>
    <rect x="292" y="140" width="40" height="40" fill="#7C3AED" rx="4"/>
    
    <!-- Средняя часть A -->
    <rect x="140" y="200" width="40" height="40" fill="#4F46E5" rx="4"/>
    <rect x="332" y="200" width="40" height="40" fill="#7C3AED" rx="4"/>
    
    <!-- Горизонтальная линия A -->
    <rect x="140" y="260" width="232" height="40" fill="#6366F1" rx="4"/>
    
    <!-- Нижняя часть A -->
    <rect x="140" y="320" width="40" height="40" fill="#4F46E5" rx="4"/>
    <rect x="332" y="320" width="40" height="40" fill="#7C3AED" rx="4"/>
  </g>
  
  <!-- Текст "TextToASCII" -->
  <text x="256" y="430" font-family="Arial, sans-serif" font-size="36" font-weight="bold" 
        text-anchor="middle" fill="url(#textGradient)">TextToASCII</text>
  
  <!-- Декоративная линия под текстом -->
  <line x1="140" y1="445" x2="372" y2="445" stroke="#4F46E5" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Версия -->
  <text x="256" y="465" font-family="Arial, sans-serif" font-size="16" 
        text-anchor="middle" fill="#6B7280" opacity="0.7">v3.2.0</text>
</svg>
